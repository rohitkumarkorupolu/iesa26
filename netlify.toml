# Netlify configuration for IESW 2026 Registration Form
# Drop this repo on Netlify — zero build step needed.

[build]
  publish = "."          # serve from the root (index.html is at root)

# Optional: nice redirect so /index.html always resolves to /
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301
  force  = true

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
